[workspace]
resolver = "2"
members = ["crates/*", "lib/*"]

[workspace.package]
edition = "2024"
license = "AGPL-3.0-only"
repository = "https://github.com/rtkay123/warden"

[workspace.dependencies]
anyhow = "1.0.94"
async-nats = "0.38.0"
axum = "0.7.9"
bon = "3.2.0"
clap = "4.5.23"
config = { version = "0.14.1", default-features = false }
prost = "0.13.3"
secrecy = "0.10.3"
serde = "1.0.215"
serde_json = "1.0.133"
sqlx = { version = "0.8.2", default-features = false }
thiserror = "2.0.4"
time = "0.3.37"
tonic = "0.12.3"
tokio = "1.42.0"
tracing = "0.1.41"
warden-core = { path = "lib/warden-core" }
warden-infra = { path = "lib/warden-infra" }
