[workspace]
resolver = "2"
members = ["crates/*", "lib/*"]

[workspace.package]
edition = "2024"
license = "AGPL-3.0-only"
repository = "https://github.com/rtkay123/warden"

[workspace.dependencies]
anyhow = "1.0.94"
async-nats = "0.38.0"
axum = "0.7.9"
bon = "3.2.0"
clap = "4.5.23"
config = "0.14.1"
futures-util = "0.3.31"
log = "0.4.22"
prost = "0.13.4"
secrecy = "0.10.3"
serde = "1.0.216"
serde_json = "1.0.133"
sqlx = { version = "0.8.2", default-features = false }
thiserror = "2.0.7"
time = "0.3.37"
tokio = "1.42.0"
tonic = "0.12.3"
tower-http = "0.6.2"
tracing = "0.1.41"
url = "2.5.4"
uuid = "1.11.0"
utoipa = "5.2.0"
warden-core = { path = "lib/warden-core" }
warden-infra = { path = "lib/warden-infra" }
