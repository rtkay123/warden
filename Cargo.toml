[workspace]
resolver = "2"
members = ["crates/*", "lib/*"]

[workspace.package]
edition = "2024"
license = "AGPL-3.0-only"
repository = "https://github.com/rtkay123/warden"

[workspace.dependencies]
anyhow = "1.0.94"
axum = "0.7.9"
prost = "0.13.3"
serde = "1.0.215"
time = "0.3.37"
tonic = "0.12.3"
tokio = "1.42.0"
tracing = "0.1.41"
warden-core = { path = "lib/warden-core" }
warden-infra = { path = "lib/warden-infra" }
