services:
  valkey:
    image: valkey/valkey:8.0.1-alpine3.20
    command: "valkey-server --port 6379"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -p 6379 ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
    networks:
      - warden
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10.22-alpine
    entrypoint: nats-server
    command: ["--js", "-m", "8222"]
    volumes:
      - nats-data:/data
    networks:
      - warden
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  nats-data:

networks:
  warden:
